spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/myaimentor
    username: mentor
    password: mentor1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO
    myaimentor_api: DEBUG
    org.hibernate.SQL: DEBUG

ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-this-is-only-for-local}
  access-token-expiration: 3600000      # 1h
  refresh-token-expiration: 1209600000  # 14d
