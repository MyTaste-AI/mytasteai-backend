services:
  postgres:
    image: postgres:16
    container_name: myaimentor-postgres
    environment:
      POSTGRES_DB: myaimentor
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor -d myaimentor"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: myaimentor-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mentor
      MONGO_INITDB_ROOT_PASSWORD: mentor1234
      MONGO_INITDB_DATABASE: myaimentor
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://mentor:mentor1234@localhost:27017/admin --quiet"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
